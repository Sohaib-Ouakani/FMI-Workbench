name: Docker Image Test

on:
  push:
    branches: [ci-test]
  workflow_dispatch:

jobs:
  test-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile          # adjust if Dockerfile is not at root
          tags: myapp:test
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          load: true                  # load image into local Docker daemon

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run container in background
        run: |
          docker run -d --name myapp -p 8080:8080 myapp:test

      - name: Wait for service to be ready
        run: |
          for i in {1..30}; do
            if curl --fail http://localhost:8080/health; then
              exit 0
            fi
            sleep 1
          done
          echo "Service did not become healthy in time"
          exit 1

      - name: (Optional) Run integration tests against container
        run: |
          # Example: run a simple test script that uses the API
          # You can also reuse your existing test suite if you have a way to
          # point it to localhost:8080
          curl --fail http://localhost:8080/health || exit 1
          # Add more API endpoints checks as needed

      - name: Print container logs on failure
        if: failure()
        run: docker logs myapp

      - name: Stop and remove container
        if: always()
        run: docker rm -f myapp || true